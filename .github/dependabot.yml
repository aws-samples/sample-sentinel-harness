# Dependabot configuration for the sentinel-harness supply chain.
#
# Keeps three ecosystems patched on a weekly cadence:
#   - pip            : Python runtime/test deps declared in pyproject.toml + requirements.txt (repo root)
#   - npm            : the AWS CDK app under iac-cdk/ (package.json / package-lock.json)
#   - github-actions : the third-party actions used by the workflows in .github/workflows/
#
# All PRs are grouped where it reduces churn and labelled so they are easy to triage.
# This file is token-free: Dependabot runs with GitHub's built-in permissions.
version: 2

updates:
  # --- Python (repo root) -------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-dev:
        patterns:
          - "*"

  # --- CDK app (iac-cdk/) -------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/iac-cdk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      cdk:
        patterns:
          - "aws-cdk*"
          - "constructs"
      dev-tooling:
        patterns:
          - "typescript"
          - "ts-node"
          - "@types/*"

  # --- GitHub Actions -----------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
