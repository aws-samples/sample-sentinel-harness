# Lenient mypy config for the sentinel-harness CI type-check job.
# ============================================================================
# INTENT: start GREEN today, RATCHET later. This is deliberately lenient so the
# type gate can be turned on now (over the core control-plane modules) without a
# big up-front annotation project, then tightened over time by removing the
# relaxations below one at a time.
#
# What is (temporarily) relaxed and why:
#   * ignore_missing_imports — boto3/botocore/yaml ship partial or no stubs; we
#     do not want third-party stub gaps to fail our own type gate yet.
#   * disable_error_code = attr-defined — core.py intentionally does dynamic
#     module-attribute rebinding (`_mod._control = _control`) to keep sibling
#     modules pointed at the active-region client after a region switch; mypy
#     cannot see a runtime setattr on a module object.
#   * disable_error_code = misc — registry.py builds a generator whose declared
#     item type is looser than the annotation (name may be None before the
#     downstream validation filters it); a pre-existing imprecision, not a bug.
#
# Everything else IS enforced: any other typing error in the checked modules
# fails the build. To ratchet, delete a disabled code / flip a flag and fix the
# fallout.
[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_unused_ignores = False
disable_error_code = attr-defined, misc
